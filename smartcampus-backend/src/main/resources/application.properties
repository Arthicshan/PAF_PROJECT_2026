# Copy this file to application.properties and fill in your values

server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.mongodb.uri=mongodb://localhost:27017/paf-project
spring.mongodb.database=${MONGODB_DATABASE:paf-project}
spring.mongodb.representation.uuid=standard

# Legacy Spring Boot 3 keys kept for compatibility with older tooling.
spring.data.mongodb.uri=${spring.mongodb.uri}
spring.data.mongodb.database=${spring.mongodb.database}
spring.data.mongodb.uuid-representation=${spring.mongodb.representation.uuid}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.security.oauth2.client.registration.google.client-id=local-google-client-id
spring.security.oauth2.client.registration.google.client-secret=local-google-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

app.jwt.secret=replace-this-dev-jwt-secret-min-32-chars
app.jwt.expiration-ms=86400000
app.admin.emails=
app.admin.setup-key=dev-admin-setup-key

app.cors.allowed-origins=http://localhost:3000
